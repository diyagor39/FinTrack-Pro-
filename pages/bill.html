<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recurring Bills</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="page-container">

    <h1>Recurring Bills</h1>

    <div class="bills-container">

        <div class="bill-card">
            <div>
                <h3>Netflix</h3>
                <p>Due: 25 June</p>
            </div>
            <span class="status paid">Paid</span>
        </div>

        <div class="bill-card">
            <div>
                <h3>Internet</h3>
                <p>Due: 28 June</p>
            </div>
            <span class="status unpaid">Unpaid</span>
        </div>

        <div class="bill-card">
            <div>
                <h3>Electricity</h3>
                <p>Due: 30 June</p>
            </div>
            <span class="status unpaid">Unpaid</span>
        </div>

        <div class="bill-card">
            <div>
                <h3>Mobile Recharge</h3>
                <p>Due: 05 July</p>
            </div>
            <span class="status paid">Paid</span>
        </div>

    </div>

</div>

</body>
</html>
