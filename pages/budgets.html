<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgets</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="page-container">

    <h1>Budgets</h1>
    <button class="add-btn">+ Add Budget</button>

    <div class="budget-cards">

        <div class="budget-card">
            <h3>Food</h3>
            <p>$400 / $600</p>

            <div class="progress">
                <div class="progress-bar food"></div>
            </div>
        </div>

        <div class="budget-card">
            <h3>Shopping</h3>
            <p>$250 / $500</p>

            <div class="progress">
                <div class="progress-bar shopping"></div>
            </div>
        </div>

        <div class="budget-card">
            <h3>Bills</h3>
            <p>$700 / $900</p>

            <div class="progress">
                <div class="progress-bar bills"></div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
