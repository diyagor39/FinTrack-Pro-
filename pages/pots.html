<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pots</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="page-container">

    <h1>Savings Pots</h1>

    <div class="pots-grid">

        <div class="pot-box">
            <h3>Travel Fund ✈️</h3>
            <p>Saved: $850</p>

            <div class="progress">
                <div class="progress-bar travel"></div>
            </div>

            <button>Add Money</button>
        </div>

        <div class="pot-box">
            <h3>Laptop Fund 💻</h3>
            <p>Saved: $1200</p>

            <div class="progress">
                <div class="progress-bar laptop"></div>
            </div>

            <button>Add Money</button>
        </div>

        <div class="pot-box">
            <h3>Emergency Fund 🚑</h3>
            <p>Saved: $2000</p>

            <div class="progress">
                <div class="progress-bar emergency"></div>
            </div>

            <button>Add Money</button>
        </div>

    </div>

</div>

</body>
</html>
